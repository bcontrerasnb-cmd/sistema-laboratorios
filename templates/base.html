<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agendamiento Laboratorios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
</head>
<body class="ghost-bg">
{% if session.get('usuario') %}
<nav class="navbar navbar-expand-lg ghost-navbar">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="#">Agenda Laboratorios</a>
        <div class="d-flex align-items-center">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Perfil" class="profile-pic me-2">
            <span class="text-white me-3">{{ session['nombre'] }}</span>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Salir</a>
        </div>
    </div>
</nav>
{% endif %}

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<footer class="ghost-footer text-center mt-5">
    <p>Creado por Bastian Contreras para Colegio Concepción Linares</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
