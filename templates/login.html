{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="ghost-card p-4 text-center">
            <h3 class="text-white mb-4">Sistema de Agendamiento para Laboratorios</h3>
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/login">
                <div class="mb-3">
                    <input type="text" class="form-control ghost-input" name="username" placeholder="Usuario o Correo" required>
                </div>
                <div class="mb-4">
                    <input type="password" class="form-control ghost-input" name="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-light w-100 ghost-btn">Iniciar Sesión</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
